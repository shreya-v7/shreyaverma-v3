[build]
  # Use npm so Netlify works with package-lock.json without a pnpm store.
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Set in Netlify UI (Site settings → Environment variables), never commit:
  # SPOTIFY_PLAYLIST_ID / SPOTIFY_PLAYLIST_IDS, SPOTIFY_TOP_ARTIST_IDS, SPOTIFY_FAVORITE_TRACK_ID
  # SUBSTACK_PUBLICATION_URL (@handle e.g. shreyaverma1, slug e.g. shreyave, or full URL)
  # ANTHROPIC_API_KEY (Ask Claude tab on /sherrii-heals)
  # Optional: VITE_PUBLIC_BOOKING_EMBED_URL, VITE_SPOTIFY_API_PROXY_TARGET (local proxy)

[functions]
  directory = "netlify/functions"

[dev]
  command = "npx vite --port 5173"
  framework = "#custom"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  envFiles = [".env"]

[[redirects]]
  from = "/api/spotify-playlist"
  to = "/.netlify/functions/spotify-playlist"
  status = 200
  force = true

[[redirects]]
  from = "/api/substack-posts"
  to = "/.netlify/functions/substack-posts"
  status = 200
  force = true

[[redirects]]
  from = "/api/food-plan"
  to = "/.netlify/functions/food-plan"
  status = 200
  force = true

[[redirects]]
  from = "/api/food-plan-chat"
  to = "/.netlify/functions/food-plan-chat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
